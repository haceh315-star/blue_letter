{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1>회원가입</h1>

        <form method="POST">

            <div class="form-group">
                <label>아이디</label>

                <input
                    type="text"
                    name="username"
                    required
                    minlength="3"
                    maxlength="20"
                    placeholder="아이디를 입력하세요"
                >
            </div>

            <div class="form-group">
                <label>비밀번호</label>

                <input
                    type="password"
                    name="password"
                    required
                    minlength="4"
                    placeholder="비밀번호를 입력하세요"
                >
            </div>

            <button class="primary-button">
                회원가입
            </button>

        </form>

        <div class="auth-footer">

            이미 계정이 있으신가요?

            <a href="{{ url_for('login') }}">
                로그인
            </a>

        </div>

    </div>

</div>

{% endblock %}
